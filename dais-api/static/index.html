<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DaiS Chat</title>
  <style>
    :root {
      --bg-1: #f7f3ea;
      --bg-2: #dbe8f0;
      --card: #fffdf8;
      --ink: #1f2a37;
      --muted: #516173;
      --accent: #0f766e;
      --accent-soft: #d0f1eb;
      --line: #d9d5c9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 0%, var(--bg-1), transparent 40%),
                  radial-gradient(circle at 90% 100%, var(--bg-2), transparent 40%),
                  #f3f5ef;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(1100px, 100%);
      height: min(92vh, 900px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.7fr 1fr;
      box-shadow: 0 30px 90px rgba(35, 44, 57, 0.18);
      animation: rise 320ms ease-out;
    }

    .chat-pane {
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-right: 1px solid var(--line);
      min-height: 0;
    }

    .side-pane {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
      background: linear-gradient(180deg, #fffaf2 0%, #fff 100%);
    }

    .head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(15,118,110,0.08), transparent);
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.02em;
    }

    .sub {
      margin-top: 6px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    #messages {
      overflow: auto;
      padding: 18px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .msg {
      border: 1px solid var(--line);
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      animation: fadeIn 160ms ease-out;
    }

    .user {
      background: #f8f6ff;
      border-color: #d6d0ea;
      justify-self: end;
      max-width: 90%;
    }

    .bot {
      background: #fff;
      border-color: #d9d5c9;
      justify-self: start;
      max-width: 95%;
    }

    .compose {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: #fffef9;
    }

    textarea {
      width: 100%;
      resize: vertical;
      min-height: 54px;
      max-height: 150px;
      border: 1px solid #cdd5df;
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled { opacity: 0.6; cursor: progress; }

    .controls {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .controls label {
      font-size: 0.85rem;
      color: var(--muted);
      display: grid;
      gap: 6px;
    }

    .controls input[type="number"],
    .controls input[type="text"] {
      border: 1px solid #cfd7de;
      border-radius: 8px;
      padding: 8px;
      font: inherit;
      background: #fff;
    }

    .controls input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .controls fieldset {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin: 0;
      display: grid;
      gap: 6px;
    }

    .controls legend {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0 6px;
    }

    .controls .row {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .sources {
      overflow: auto;
      padding: 14px 16px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .source {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #f5faf8;
      font-size: 0.83rem;
      line-height: 1.35;
    }

    .source .cite {
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.78rem;
      margin-bottom: 6px;
      color: #0b4a44;
      word-break: break-all;
    }

    .source .title {
      font-weight: 700;
      margin-bottom: 6px;
      color: #103b36;
    }

    .source .meta {
      font-size: 0.76rem;
      color: #5b6b7a;
      margin-top: 8px;
      word-break: break-all;
    }

    .status {
      font-size: 0.82rem;
      color: var(--muted);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 92vh;
      }

      .chat-pane { border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="chat-pane">
      <header class="head">
        <h1>DaiS Chat</h1>
        <div class="sub">Ask documentation questions and review citations in one place.</div>
      </header>

      <div id="messages" aria-live="polite"></div>

      <form class="compose" id="chat-form">
        <textarea id="message" placeholder="Ask something about your docs..." required></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </section>

    <aside class="side-pane">
      <header class="head">
        <h1>Session + Evidence</h1>
        <div class="sub">Control retrieval and see where answers came from.</div>
      </header>

      <section class="controls">
        <label>
          Session ID
          <input id="session-id" type="text" />
        </label>
        <label>
          Top K: <span id="top-k-value">5</span>
          <input id="top-k" type="range" min="1" max="20" step="1" value="5" />
        </label>
        <label>
          Max Sources Shown: <span id="max-sources-value">5</span>
          <input id="max-sources" type="range" min="1" max="12" step="1" value="5" />
        </label>
        <label>
          Min Semantic Score (strict mode): <span id="min-score-value">0.35</span>
          <input id="min-score" type="range" min="0" max="1" step="0.01" value="0.35" />
        </label>
        <fieldset>
          <legend>Strictness</legend>
          <label class="row"><input type="radio" name="strictness" value="balanced" checked /> Balanced</label>
          <label class="row"><input type="radio" name="strictness" value="strict" /> Strict (anti-hallucination)</label>
        </fieldset>
        <fieldset>
          <legend>Answer Style</legend>
          <label class="row"><input type="radio" name="answer-style" value="auto" checked /> Auto</label>
          <label class="row"><input type="radio" name="answer-style" value="concise" /> Concise</label>
          <label class="row"><input type="radio" name="answer-style" value="detailed" /> Detailed</label>
          <label class="row"><input type="radio" name="answer-style" value="steps" /> Step-by-step</label>
          <label class="row"><input type="radio" name="answer-style" value="parameters" /> Parameters only</label>
        </fieldset>
        <div class="status">Top K controls retrieval breadth. Strict mode can abstain when evidence confidence is low.</div>
        <label class="row">
          <input id="debug" type="checkbox" checked /> Include retrieved previews
        </label>
        <button id="ingest" type="button">Ingest Docs</button>
        <div class="status" id="status">Ready</div>
      </section>

      <section class="sources" id="sources"></section>
    </aside>
  </main>

  <script>
    const form = document.getElementById('chat-form');
    const msgInput = document.getElementById('message');
    const sendBtn = document.getElementById('send');
    const topKInput = document.getElementById('top-k');
    const topKValue = document.getElementById('top-k-value');
    const maxSourcesInput = document.getElementById('max-sources');
    const maxSourcesValue = document.getElementById('max-sources-value');
    const minScoreInput = document.getElementById('min-score');
    const minScoreValue = document.getElementById('min-score-value');
    const debugInput = document.getElementById('debug');
    const ingestBtn = document.getElementById('ingest');
    const sessionInput = document.getElementById('session-id');
    const messagesEl = document.getElementById('messages');
    const sourcesEl = document.getElementById('sources');
    const statusEl = document.getElementById('status');

    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function formatAnswerWithReferences(answer, sources) {
      let formatted = answer || '(empty response)';
      if (!Array.isArray(sources) || sources.length === 0) {
        return formatted;
      }

      const uniqueSources = [];
      const seen = new Set();
      for (const s of sources) {
        if (!s || !s.citation || seen.has(s.citation)) continue;
        seen.add(s.citation);
        uniqueSources.push(s);
      }

      uniqueSources.forEach((src, i) => {
        const ref = `[${i + 1}]`;
        formatted = formatted.split(`[${src.citation}]`).join(ref);
        formatted = formatted.split(src.citation).join(ref);
      });

      return formatted;
    }

    function renderSources(sources, citations, retrieved) {
      sourcesEl.innerHTML = '';
      const previews = new Map();
      (retrieved || []).forEach(item => previews.set(item.citation, item.preview || ''));
      const sourceList = Array.isArray(sources) && sources.length > 0
        ? sources
        : [...new Set(citations || [])].map(c => ({ citation: c, label: c, preview: previews.get(c) || '' }));
      const uniqueSourceList = [];
      const seen = new Set();
      for (const s of sourceList) {
        if (!s || !s.citation || seen.has(s.citation)) continue;
        seen.add(s.citation);
        uniqueSourceList.push(s);
      }

      if (uniqueSourceList.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'status';
        empty.textContent = 'No citations returned for this response.';
        sourcesEl.appendChild(empty);
        return;
      }

      uniqueSourceList.forEach((src, i) => {
        const card = document.createElement('article');
        card.className = 'source';
        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = `[${i + 1}] ${src.label || src.citation}`;
        card.appendChild(title);

        const c = document.createElement('div');
        c.className = 'cite';
        c.textContent = src.page ? `Page ${src.page}` : 'No page metadata';
        card.appendChild(c);

        const p = document.createElement('div');
        p.textContent = src.preview || previews.get(src.citation) || 'Preview unavailable for this citation.';
        card.appendChild(p);

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `Raw reference: ${src.citation}`;
        card.appendChild(meta);

        sourcesEl.appendChild(card);
      });
    }

    function selectedRadio(name, fallback) {
      const el = document.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : fallback;
    }

    function refreshControlLabels() {
      topKValue.textContent = String(topKInput.value);
      maxSourcesValue.textContent = String(maxSourcesInput.value);
      minScoreValue.textContent = Number(minScoreInput.value).toFixed(2);
    }

    async function sendMessage(message) {
      const payload = {
        message,
        session_id: sessionInput.value.trim() || null,
        top_k: Number(topKInput.value || 5),
        max_sources: Number(maxSourcesInput.value || 5),
        strictness: selectedRadio('strictness', 'balanced'),
        min_semantic_score: Number(minScoreInput.value || 0.35),
        answer_style: selectedRadio('answer-style', 'auto'),
        debug: Boolean(debugInput.checked)
      };

      sendBtn.disabled = true;
      statusEl.textContent = 'Asking DaiS...';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Request failed');
        }

        if (data.session_id) {
          sessionInput.value = data.session_id;
        }

        const formattedAnswer = formatAnswerWithReferences(data.answer || '(empty response)', data.sources || []);
        appendMessage('bot', formattedAnswer);
        renderSources(data.sources || [], data.citations || [], data.retrieved || []);
        statusEl.textContent = 'Complete';
      } catch (err) {
        appendMessage('bot', `Error: ${err.message}`);
        statusEl.textContent = 'Failed';
      } finally {
        sendBtn.disabled = false;
        msgInput.focus();
      }
    }

    async function ingestDocs() {
      ingestBtn.disabled = true;
      statusEl.textContent = 'Ingesting docs...';

      try {
        const res = await fetch('/ingest', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Ingest failed');
        }

        const summary =
          `Ingest complete: files=${data.files}, doc_units=${data.doc_units}, chunks=${data.chunks}, collection=${data.collection}`;
        appendMessage('bot', summary);
        statusEl.textContent = 'Ingest complete';
      } catch (err) {
        appendMessage('bot', `Ingest error: ${err.message}`);
        statusEl.textContent = 'Ingest failed';
      } finally {
        ingestBtn.disabled = false;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = msgInput.value.trim();
      if (!text) return;

      appendMessage('user', text);
      msgInput.value = '';
      await sendMessage(text);
    });

    topKInput.addEventListener('input', refreshControlLabels);
    maxSourcesInput.addEventListener('input', refreshControlLabels);
    minScoreInput.addEventListener('input', refreshControlLabels);
    ingestBtn.addEventListener('click', ingestDocs);

    refreshControlLabels();
    appendMessage('bot', 'DaiS is ready. Ask a question to begin.');
  </script>
</body>
</html>
