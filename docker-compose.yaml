services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant:/qdrant/storage

  dais-flask:
    build: .
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - MODEL_NAME=dolphin3:latest
      - EMBED_MODEL=nomic-embed-text
      - DOCS_PATH=/data/docs
    ports:
      - "8081:8081"
    volumes:
      - ./docs:/data/docs:ro
    depends_on:
      - ollama
      - qdrant

volumes:
  ollama:
  qdrant:
