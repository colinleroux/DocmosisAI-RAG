services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    # If you have NVIDIA GPU support in Docker, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant:/qdrant/storage

  dais-api:
    build: ./dais-api
    container_name: dais-api
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - MODEL_NAME=dolphin3:latest
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/data/docs:ro
    depends_on:
      - ollama
      - qdrant

volumes:
  ollama:
  qdrant:
